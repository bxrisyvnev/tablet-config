# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 1  #1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

   # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.5

    shadow {
        enabled = true
        range = 700 #700
        render_power = 3  #3
        color = rgba(00,00,00,01)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 0
        passes = 0

        vibrancy = 0.1696
    }
}




# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    workspace_wraparound = true
    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = easeOut, 0.17, 0.67, 0.29, 0.95

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
	#animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
	#animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = windowsIn, 1, 3, easeOut, slide
    animation = windowsOut, 1, 3, easeOut, slide
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
	#animation = workspaces, 1, 1.94, almostLinear, fade
	#animation = workspacesIn, 1, 1.21, almostLinear, fade
	#animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = workspaces, 1, 1.94, easeOutQuint, slide
    animation = workspacesIn, 1, 1.21, easeOutQuint, slide
    animation = workspacesOut, 1, 1.94, easeOutQuint, slide

}



# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0

monitor = eDP-1, highress, auto, 1
#monitor = DP-10, 2560x1440@120, auto, 1 
#monitor = DP-10, 3840x2160@60.00, auto, 1
monitor = DP-10, 2560x1440@120, auto, 1
monitor = DP-11, highress, auto, 1

#monitor = desc:Acer Technologies VG240Y TG5EE0018524, highress, auto, 1
#monitor = auto,preferred,auto,1


#workspace = HDMI-A-1, 9

windowrule = match:workspace w[tv1], match:float 0, border_size 0
#windowrule = rounding 0, floating:0, onworkspace:w[tv1]
#windowrule = bordersize 0, floating:0, onworkspace:f[1]
#windowrule = rounding 0, floating:0, onworkspace:f[1]

windowrule = match:class ^(firefox)$, opacity 0.9 0.9
windowrule = match:class ^(firefox)$, border_size 0
windowrule = opacity 1.0 1.0, match:class ^(mako)$
windowrule = border_size 0,    match:class ^(mako)$
windowrule = opacity 0.8 override, match:class ^(org\.kde\.dolphin)$
windowrule = opacity 0.8 0.8,      match:class ^(jetbrains-idea-ce)$

# Cava
windowrule = match:class ^(cava)$, workspace special:magic
windowrule = match:class ^(cava)$, float 1
windowrule = match:class ^(cava)$, size 400 1080
windowrule = match:class ^(cava)$, move 20 70
windowrule = match:class ^(cava)$, border_size 0

# Spotify
windowrule = match:class ^(spotify_player)$, workspace special:magic
windowrule = match:class ^(spotify_player)$, float 1
windowrule = match:class ^(spotify_player)$, size 1470 1080
windowrule = match:class ^(spotify_player)$, move 430 70
windowrule = match:class ^(spotify_player)$, border_size 0

#Boris put this here not sure if it works
windowrule = match:class ^(Alacritty)$, opacity 0.8
windowrule = match:class ^(Kitty)$, opacity 0.7
windowrule = match:class ^(spotify_player)$, workspace special:magic

windowrule = match:class ^(cava)$, workspace special:magic

windowrule = match:title ^(gsimplecal)$, float 1, move 44.1% 5%

windowrule = match:class ^(spotify)$, opacity 0.85 0.85
windowrule = match:class ^(vesktop)$, border_size 0, decorate 0

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod SHIFT  + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


device {
    name = "e-signal-usb-gaming-mouse"
    sensitivity = 0
    accel_profile = flat
    natural_scroll = false
}

gesture = 3, horizontal, workspace

plugin {
    hyprexpo {
        #general 
        columns = 3
        gaps_in = 50
        gaps_out = 25
        bg_col = rgb(000000)
        workspace_method = first 1
        
        #borders
        border_color = rgb(ffffff)
        border_color_current = rgba(33ccffee) rgba(33ccffee) 45deg
        border_color_focus   = rgba(33ccffee) rgba(33ccffee) 30deg
        border_color_hover   = rgba(33ccffee) rgba(33ccffee) 30deg
        

        #labels
        label_enable = 1
        label_bg_shape = circle
        label_position = center-center
        label_offset_x = 10
        label_offset_y = 10
        label_color_default = rgb(ffffff)
        label_color_hover   = rgb(33ccff)
        label_scale_hover = 1.0
        label_scale_focus = 1.0
        label_bg_enable = 1
        label_bg_color = rgba(00000088)
        label_bg_rounding = 15
        # label_padding = 1

        label_font_size = 100
        label_font_family = Sans
        label_font_bold = 1
        label_font_italic = 0
        label_text_underline = 0
        label_text_strikethrough = 0
    }
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Fix issue with cursor causing lag
cursor {
    no_hardware_cursors = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


