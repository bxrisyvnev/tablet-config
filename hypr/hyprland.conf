# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
#bind = $mainMod, C, exec, ~/.config/hypr/scripts/check_mode_ws.sh
bind = $mainMod, C, exec, hyprctl dispatch killactive
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, kitty -e sh -c 'EDITOR=nvim yazi'
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, exec, ~/.config/hypr/scripts/hypr_toggle_tab.sh
bind = $mainMod SHIFT, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, firefox
bind = $mainMod SHIFT, S, exec, bash -c 'file=~/Pictures/screenshot-$(date +%F_%H-%M-%S).png; grim -g "$(slurp)" "$file" && wl-copy < "$file" && notify-send "Screenshot taken" "Saved to $file and copied to clipboard" --icon="$file"'
#bind = $mainMod, S, exec, spotify
bind = $mainMod, P, exec, pavucontrol
bind = $mainMod, Y, exec, youtube
bind = $mainMod, I, exec, jetbrains-idea-ce
bind = $mainMod, N, exec, kitty -e nvim
bind = $mainMod, U, exec, blueman-manager
bind =$mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, X, exec, env GTK_LAYER_SHELL_NAMESPACE=wlogout-sheet wlogout -p layer-shell -b 3 -T 880 -B 32 -c 14 -r 0
bind = WIN SHIFT, F, fullscreen, 1 #fulscreen with waybar showing
bind = $mainMod, D, exec, vesktop

bind = $mainMod SHIFT, B, exec, /home/boris/.config/hypr/firefox-opacity.sh

bind = $mainMod, K, exec, ~/.config/hypr/scripts/wvkbd-toggle.sh

# Focus floating
bind = SUPER, TAB, exec, ~/.config/hypr/scripts/focus_floating.sh

bind = $mainMod SHIFT, R, exec, ~/.config/scripts/caelestia.sh

bind = SUPER, A, exec, hyprctl keyword monitor "eDP-1,preferred,auto,1,transform,1"
