general {
    gaps_in = 5
    gaps_out = 50
    border_size = 1
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.5

    shadow {
        enabled = true
        range = 700
        render_power = 3
        color = rgba(00,00,00,01)
    }

    blur {
        enabled = true
        size = 0
        passes = 0
        vibrancy = 0.1696
    }
}

